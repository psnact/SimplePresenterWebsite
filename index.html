<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f5f3ef" />
    <meta name="description" content="SimplePresenter keeps small groups on the same slide." />
    <title>SimplePresenter — minimal group display</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="skip" href="#main">Skip to content</a>

    <main id="main" class="shell">
      <header class="masthead">
        <div class="brand">
          <img class="brand__mark" src="Logo.png" alt="SimplePresenter icon" />
          <div class="brand__text">
            <span class="brand__name">SimplePresenter</span>
            <span class="brand__note">Lifting the Name of the Lord</span>
          </div>
        </div>
        <a class="link" href="docs.html">Docs</a>
      </header>

      <section class="hero">
        <p class="hero__tag">For small groups</p>
        <h1>Present. Share. Focus.</h1>
        <p class="hero__line">Verses, lyrics, cues. One calm window.</p>
        <div class="hero__actions">
          <a class="btn" href="https://github.com/psnact/SimplePresenter/releases/latest/download/SimplePresenter-Setup.exe">Windows</a>
          <a class="btn btn--ghost" href="https://github.com/psnact/SimplePresenter/releases/latest/download/SimplePresenterARM.dmg">macOS ARM</a>
          <a class="btn btn--ghost" href="https://github.com/psnact/SimplePresenter/releases/latest/download/SimplePresenterIntel.dmg">macOS Intel</a>
        </div>
        <p class="hero__hint">Open source on <a href="https://github.com/psnact/SimplePresenter" target="_blank" rel="noopener noreferrer">GitHub</a>.</p>
      </section>

      <section class="panel" aria-label="SimplePresenter preview">
        <ul class="chips" aria-label="Highlights">
          <li>Verses</li>
          <li>Lyrics</li>
          <li>Media</li>
          <li>Notes</li>
        </ul>
        <figure class="frame">
          <img src="App_Screenshot.png" alt="SimplePresenter interface" />
        </figure>
      </section>

      <footer class="footer">
        <span>Windows + macOS</span>
        <a class="link" href="https://github.com/psnact/SimplePresenter" target="_blank" rel="noopener noreferrer">GitHub</a>
      </footer>
    </main>
  </body>
</html>
